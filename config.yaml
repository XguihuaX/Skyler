    description: 本地文件读取（Anthropic 官方 server）
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - ${HOME}/Documents
    enabled: false
    expose_via_skyler_server: true
  brave-search:
    description: Brave 搜索（需要 BRAVE_API_KEY）
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-brave-search'
    env:
      BRAVE_API_KEY: ${BRAVE_API_KEY}
    enabled: false
    expose_via_skyler_server: false
  notion:
    description: 搜索 / 创建 / 更新 Notion 页面（需要 NOTION_API_KEY，UI 配置）
    transport: stdio
    command: npx
    args:
    - -y
    - '@notionhq/notion-mcp-server'
    env_required:
    - NOTION_API_KEY
    enabled: false
    expose_via_skyler_server: false

# v3.5 chunk 8a — 活动感知 (active app / browser URL / 公开页面正文 / 主动 trigger)
# 默认 enabled: true，但 macOS AppleScript 权限要用户首次启动手动授权（NSAppleEvents
# UsageDescription 弹窗）。前端 ActivityPermissionModal 会在自检失败时引导用户去
# 系统设置 → 隐私与安全性 → 自动化 给权限。
activity_watcher:
  enabled: true
  poll_interval_seconds: 30
  fetch_url_content: true        # 切到非黑名单 URL 时后台抓正文给 Momo 看
  blocked_apps:
    - 1Password
    - Bitwarden
    - Keychain Access
  blocked_url_patterns:
    # 银行 / 金融
    - '*chase.com*'
    - '*bankofamerica.com*'
    - '*wellsfargo.com*'
    - '*paypal.com*'
    # 邮箱
    - '*mail.google.com*'
    - '*outlook.live.com*'
    - '*outlook.office.com*'
    - '*mail.yahoo.com*'
    - '*mail.qq.com*'
    - '*mail.163.com*'
    # 社交（登录后内容隐私敏感）
    - '*facebook.com/*'
    - '*instagram.com/*'
    - '*twitter.com/*'
    - '*x.com/*'
    - '*linkedin.com/feed*'
    # 本地 dev / 局域网
    - '*localhost*'
    - '127.0.0.1*'
    - '192.168.*'
    - '10.0.*'
  trigger_throttle_minutes: 30   # 同类型 activity trigger 间隔
  max_daily_triggers: 5          # 一天最多触发 activity trigger 数（0 = 无上限）


# v3.5 chunk 8a-ext — 智能陪伴 judge 慢路径
# 在快路径(IDE/音乐/技术文档等硬编码 trigger)没命中时,用 qwen-turbo
# 判断"用户在当前 app/URL 停 5+ min 时是否值得主动说话"。yes → fire 走
# 现有 proactive engine + ChatAgent 主对话。共享 activity_watcher 的
# daily_cap (max_daily_triggers)。
#
# 三重门防滥用:
#   * min_stay_minutes  停留 < N 分钟 → 不 judge(默 5)
#   * throttle_minutes  同 stay_key 节流(默 10)
#   * fire_throttle     同 label 30 min(由 activity_watcher.trigger_throttle_minutes 共享)
activity_judge:
  enabled: true          # 默认 ON。用户明确要陪伴感,SettingsPanel 二级 toggle 可关
  model: qwen-turbo      # 便宜模型,与 chunk 10/11 同源
  min_stay_minutes: 5
  throttle_minutes: 10
  prompt_max_chars: 2000 # 喂 judge 的 URL 正文摘要上限
