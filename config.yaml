default_model: openai/qwen3.6-plus
planner_model: openai/qwen-turbo
default_user_id: default
available_models:
- id: openai/qwen3.6-plus
  display_name: Qwen3.6 Plus
  description: 稳定平衡，日常推荐
  tier: stable
- id: openai/qwen3.6-max-preview
  display_name: Qwen3.6 Max
  description: 最强能力，preview 期可能偶发不稳
  tier: preview
base_instruction: 回复简短克制，通常不超过3句话，除非用户明确需要详细解释。不总结、不复述用户说的话。不用"当然"、"没问题"、"好的"等开场白。不在句尾加多余的关心语。像真实的人一样说话，不像客服或AI助手。
memory:
  long_term_enabled: true
  profile_enabled: true
  # v3.5 chunk 9 Part 0：embedding 检索性能调优
  #   device:                "auto" / "cpu" / "mps"。auto = cpu（benchmark
  #                          显示对短文本 cpu / mps median 几乎一致 ~15ms，
  #                          mps avg 因 cold JIT 更高 + 与 Whisper 抢 GPU；
  #                          要 mps 显式改 ``device: mps``）。详见
  #                          ROADMAP §chunk 9 audit。
  #   short_input_threshold: 单 user 输入字符数 < N 时跳过 memory 检索（短问
  #                          候 / 单字命令 / 标点等无语义内容，向量检索价值
  #                          极低，纯浪费 10-30ms encode 时间）
  #   cache_size:            最近 N 条 user_input → embedding 的 LRU 缓存大小
  #   cache_ttl_seconds:     缓存 entry TTL；超过即丢弃重新 encode
  embedding:
    device: auto
    short_input_threshold: 10
    cache_size: 100
    cache_ttl_seconds: 300
  # v3.5 chunk 9 Part 4：forgetting curve
  #   score = relevance * (1 + log(1 + access_count)) / (1 + age_days * decay)
  #   threshold      score < N 的 entry 不进 top-k（保留 DB，可被后续召回）
  #   age_decay      每天衰减系数（0.01 = 100 天后约半权）
  #   enabled=false  退回旧 pure-cosine 排序（用于调试 / 用户偏好关闭衰减）
  forgetting_curve:
    enabled: true
    threshold: 0.3
    age_decay_factor: 0.01
  # v3.5 chunk 11：structured profile_data（取代 chunk 9 自然语言 profile_summary）
  #   enabled=false       → cron 不真跑；legacy profile_summary 注入路径继续
  #   cron                每天定时全用户重生
  #   input_days          重生时取最近 N 天的 role='user' 消息作输入
  #   min_user_messages   input_days 窗口内 user 行 < N → skip（数据保护）
  profile_structured:
    enabled: true
    cron: "55 23 * * *"
    input_days: 7
    min_user_messages: 10
search:
  enable_search: true
cache:
  profile_ttl_seconds: 300
tts:
  enabled: true
  provider: cosyvoice
  cosyvoice:
    model: cosyvoice-v3-flash
    default_voice: longyumi_v3
    instruct_supported: false
  emotions:
  - neutral
  - happy
  - sad
  - angry
  - surprised
  - fearful
  - disgusted
  available_voices:
    cosyvoice:
    - id: longyumi_v3
      label: 龙裕米 v3
      traits: 正经青年女
      instruct: false
    - id: longfeifei_v3
      label: 龙菲菲 v3
      traits: 甜美娇气女
      instruct: false
    - id: longwan_v3
      label: 龙婉 v3
      traits: 柔声女
      instruct: false
    - id: longqiang_v3
      label: 龙强 v3
      traits: 浪漫女
      instruct: false
    - id: longxing_v3
      label: 龙星 v3
      traits: 邻家女
      instruct: false
    - id: longanhuan
      label: 龙安欢
      traits: 欢脱元气女
      instruct: true
    - id: longanyang
      label: 龙安洋
      traits: 阳光大男孩
      instruct: true
calendar:
  default_source: apple
apple_calendar:
  enabled: true
google_calendar:
  enabled: false
briefing:
  enabled: true
  cron: 0 9 * * *
  voice: null
proactive:
  enabled: true
  character_id_override: null
  # v3-G chunk 2.6 mode 互斥：'wake_call' / 'morning_briefing' / 'off'
  # 'wake_call' 推荐——默认（模式 B 邀请对话，cron 短问候 + 用户响应触发简报）
  # 'morning_briefing'（模式 A 单方面播报，cron 整段简报）
  # 'off' 不注册任何 cron
  mode: wake_call
  morning_briefing:
    enabled: true
    cron: 0 9 * * *
    city: 东京
  wake_call_briefing:
    cron: 0 8 * * *
    pending_ttl_minutes: 30
    default_snooze_minutes: 30
    city: 东京
  # v3-G chunk 4 Part C — v3-F' trigger pack（模式 B 邀请对话）
  triggers:
    lunch_call:
      enabled: true
      cron_weekday: 0 12 * * 1-5
      cron_weekend: 30 11 * * 0,6
    dinner_call:
      enabled: true
      cron: 30 18 * * *
    bedtime_chat:
      enabled: false   # 默认关，敏感场景手动开
      cron: 30 22 * * *
    long_idle:
      enabled: false   # 默认关，最容易骚扰
      idle_threshold_minutes: 30
      cooldown_minutes: 90
      heartbeat_grace_seconds: 30
      check_interval_minutes: 5
scheduler:
  timezone: Asia/Tokyo
mcp_server:
  enabled: true
  endpoint_path: /mcp
mcp_clients:
  filesystem:
    description: 本地文件读取（Anthropic 官方 server）
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - ${HOME}/Documents
    enabled: false
    expose_via_skyler_server: true
  brave-search:
    description: Brave 搜索（需要 BRAVE_API_KEY）
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-brave-search'
    env:
      BRAVE_API_KEY: ${BRAVE_API_KEY}
    enabled: false
    expose_via_skyler_server: false
  # v3.5 chunk 7 姿态 B demo —— Notion 官方 MCP server。
  # 包名：@notionhq/notion-mcp-server（Notion 官方维护，makenotion/notion-mcp-server）。
  # 凭证 NOTION_API_KEY 由 SettingsPanel "扩展能力" section 配置后写入
  # mcp_credentials 表；启动子进程时 client.py 自动注入到 env，覆盖此处可能
  # 留空的 env 字段。
  notion:
    description: 搜索 / 创建 / 更新 Notion 页面（需要 NOTION_API_KEY，UI 配置）
    transport: stdio
    command: npx
    args:
    - -y
    - '@notionhq/notion-mcp-server'
    env_required:
    - NOTION_API_KEY
    enabled: false
    expose_via_skyler_server: false
