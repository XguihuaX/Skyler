default_model: openai/qwen3.6-plus
planner_model: openai/qwen-turbo
default_user_id: default
available_models:
- id: openai/qwen3.6-plus
  display_name: Qwen3.6 Plus
  description: 稳定平衡，日常推荐
  tier: stable
- id: openai/qwen3.6-max-preview
  display_name: Qwen3.6 Max
  description: 最强能力，preview 期可能偶发不稳
  tier: preview
base_instruction: 回复简短克制，通常不超过3句话，除非用户明确需要详细解释。不总结、不复述用户说的话。不用"当然"、"没问题"、"好的"等开场白。不在句尾加多余的关心语。像真实的人一样说话，不像客服或AI助手。
memory:
  long_term_enabled: true
  profile_enabled: true
search:
  enable_search: true
cache:
  profile_ttl_seconds: 300
tts:
  enabled: true
  provider: cosyvoice
  cosyvoice:
    model: cosyvoice-v3-flash
    default_voice: longyumi_v3
    instruct_supported: false
  emotions:
  - neutral
  - happy
  - sad
  - angry
  - surprised
  - fearful
  - disgusted
  available_voices:
    cosyvoice:
    - id: longyumi_v3
      label: 龙裕米 v3
      traits: 正经青年女
      instruct: false
    - id: longfeifei_v3
      label: 龙菲菲 v3
      traits: 甜美娇气女
      instruct: false
    - id: longwan_v3
      label: 龙婉 v3
      traits: 柔声女
      instruct: false
    - id: longqiang_v3
      label: 龙强 v3
      traits: 浪漫女
      instruct: false
    - id: longxing_v3
      label: 龙星 v3
      traits: 邻家女
      instruct: false
    - id: longanhuan
      label: 龙安欢
      traits: 欢脱元气女
      instruct: true
    - id: longanyang
      label: 龙安洋
      traits: 阳光大男孩
      instruct: true
calendar:
  default_source: apple
apple_calendar:
  enabled: true
google_calendar:
  enabled: false
briefing:
  enabled: true
  cron: 0 9 * * *
  voice: null
proactive:
  enabled: true
  character_id_override: null
  # v3-G chunk 2.6 mode 互斥：'wake_call' / 'morning_briefing' / 'off'
  # 'wake_call' 推荐——默认（模式 B 邀请对话，cron 短问候 + 用户响应触发简报）
  # 'morning_briefing'（模式 A 单方面播报，cron 整段简报）
  # 'off' 不注册任何 cron
  mode: wake_call
  morning_briefing:
    enabled: true
    cron: 0 9 * * *
    city: 东京
  wake_call_briefing:
    cron: 0 8 * * *
    pending_ttl_minutes: 30
    default_snooze_minutes: 30
    city: 东京
scheduler:
  timezone: Asia/Tokyo
mcp_server:
  enabled: true
  endpoint_path: /mcp
mcp_clients:
  filesystem:
    description: 本地文件读取（Anthropic 官方 server）
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - ${HOME}/Documents
    enabled: false
    expose_via_skyler_server: true
  brave-search:
    description: Brave 搜索（需要 BRAVE_API_KEY）
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-brave-search'
    env:
      BRAVE_API_KEY: ${BRAVE_API_KEY}
    enabled: false
    expose_via_skyler_server: false
