default_model: openai/qwen-plus
planner_model: openai/qwen-turbo
default_user_id: default
base_instruction: 回复简短克制，通常不超过3句话，除非用户明确需要详细解释。不总结、不复述用户说的话。不用"当然"、"没问题"、"好的"等开场白。不在句尾加多余的关心语。像真实的人一样说话，不像客服或AI助手。
memory:
  long_term_enabled: true
  profile_enabled: true
search:
  enable_search: true
cache:
  profile_ttl_seconds: 300
tts:
  enabled: true
  provider: cosyvoice
  cosyvoice:
    model: cosyvoice-v3-flash
    default_voice: longyumi_v3
    instruct_supported: false
  emotions:
  - neutral
  - happy
  - sad
  - angry
  - surprised
  - fearful
  - disgusted
  # v3-G' patch（撤销 chunk 1a SSML 错误后定型）：可用音色目录，GET
  # /api/tts/voices 直接返回。加新音色直接 append 此处，前端 CharacterPanel
  # 下拉自动多一项；不需要改前端 / router 代码。
  #
  # 字段说明：
  #   id       音色标识，写入 character.voice_model JSON 的 voice 字段
  #   label    中文显示名
  #   traits   人物气质 / 风格提示，CharacterPanel 下拉显示
  #   instruct true=支持 instruct 自然语言情感引导（cosyvoice.py 走
  #            "你说话的情感是 {emotion}。"路径让 happy/sad/angry/surprised
  #            真生效）；false=不支持，emotion 字段被丢弃但 plain TTS 仍正常
  #
  # SSML 字段在 chunk 1a 错误地用作"emotion 真生效"标记 —— DashScope SSML
  # 实际不接受 emotion 属性，撤销该字段。未来若用 SSML 控制 rate/pitch/
  # volume/effect/bgm 等真实属性时再加 ssml: true。
  available_voices:
    cosyvoice:
      - id: longyumi_v3
        label: 龙裕米 v3
        traits: 正经青年女
        instruct: false
      - id: longfeifei_v3
        label: 龙菲菲 v3
        traits: 甜美娇气女
        instruct: false
      - id: longwan_v3
        label: 龙婉 v3
        traits: 柔声女
        instruct: false
      - id: longqiang_v3
        label: 龙强 v3
        traits: 浪漫女
        instruct: false
      - id: longxing_v3
        label: 龙星 v3
        traits: 邻家女
        instruct: false
      - id: longanhuan
        label: 龙安欢
        traits: 欢脱元气女
        instruct: true
      - id: longanyang
        label: 龙安洋
        traits: 阳光大男孩
        instruct: true

# v3-G chunk 1 — 起床简报（v0.1：模板拼接，chunk 2 升级 ChatAgent 智能版）
briefing:
  enabled: true
  cron: "0 9 * * *"     # 默认本地时区 09:00；时区按 scheduler.timezone（默认 Asia/Tokyo）
  voice: null            # null = 用 Momo (id=1) 当前 voice_model；后续可填具体 voice JSON

# v3-G chunk 0 — APScheduler 单例时区
scheduler:
  timezone: Asia/Tokyo

# v3-G chunk 1.5 — Skyler 作 MCP server 暴露给外部 LLM 工具
# 启用后 ``POST /mcp`` 可被 Claude Desktop / Cursor / Claude Code 调用。
# 鉴权 Bearer token 走 .env 的 MCP_BEARER_TOKEN（不在 yaml 里写明文）。
mcp_server:
  enabled: true
  endpoint_path: /mcp
