default_model: dashscope/qwen3.6-max-preview
planner_model: dashscope/qwen-turbo
default_user_id: default
prompt_caching:
  enabled: true
base_instruction: 回复简短克制，通常不超过3句话，除非用户明确需要详细解释。不总结、不复述用户说的话。不用"当然"、"没问题"、"好的"等开场白。不在句尾加多余的关心语。像真实的人一样说话，不像客服或AI助手。
memory:
  long_term_enabled: true
  profile_enabled: true
  embedding:
    device: auto
    short_input_threshold: 10
    cache_size: 100
    cache_ttl_seconds: 300
  forgetting_curve:
    enabled: true
    threshold: 0.3
    age_decay_factor: 0.01
  profile_structured:
    enabled: true
    cron: 55 23 * * *
    input_days: 7
    min_user_messages: 10
  extractor:
    enabled: true
    interval_seconds: 300
    batch_size: 50
    min_confidence: 0.5
    dup_threshold: 0.9
    llm_judge_enabled: false
  summary:
    enabled: true
    model: dashscope/qwen3.5-flash
    token_budget: 1000
    batch_turns: 10
    min_batch: 4
search:
  enable_search: true
cache:
  profile_ttl_seconds: 300
tts:
  enabled: true
  provider: cosyvoice
  cosyvoice:
    model: cosyvoice-v3-flash
    default_voice: longyumi_v3
    instruct_supported: false
  emotions:
  - neutral
  - happy
  - sad
  - angry
  - surprised
  - fearful
  - disgusted
  available_voices:
    cosyvoice:
    - id: longyumi_v3
      label: 龙裕米 v3
      traits: 正经青年女
      instruct: false
    - id: longfeifei_v3
      label: 龙菲菲 v3
      traits: 甜美娇气女
      instruct: false
    - id: longwan_v3
      label: 龙婉 v3
      traits: 柔声女
      instruct: false
    - id: longqiang_v3
      label: 龙强 v3
      traits: 浪漫女
      instruct: false
    - id: longxing_v3
      label: 龙星 v3
      traits: 邻家女
      instruct: false
    - id: longanhuan
      label: 龙安欢
      traits: 欢脱元气女
      instruct: true
    - id: longanyang
      label: 龙安洋
      traits: 阳光大男孩
      instruct: true
calendar:
  default_source: apple
apple_calendar:
  enabled: true
google_calendar:
  enabled: false
briefing:
  enabled: true
  cron: 0 9 * * *
  voice: null
proactive:
  enabled: true
  character_id_override: null
  mode: wake_call
  morning_briefing:
    enabled: true
    cron: 0 9 * * *
    city: 东京
  wake_call_briefing:
    cron: 0 8 * * *
    pending_ttl_minutes: 30
    default_snooze_minutes: 30
    city: 上海
  triggers:
    lunch_call:
      enabled: true
      cron_weekday: 0 12 * * 1-5
      cron_weekend: 30 11 * * 0,6
    dinner_call:
      enabled: true
      cron: 30 18 * * *
    bedtime_chat:
      enabled: false
      cron: 30 22 * * *
    long_idle:
      enabled: false
      idle_threshold_minutes: 30
      cooldown_minutes: 90
      heartbeat_grace_seconds: 30
      check_interval_minutes: 5
scheduler:
  timezone: Asia/Tokyo
mcp_server:
  enabled: true
  endpoint_path: /mcp
mcp_clients:
  filesystem:
    description: 本地文件读取（Anthropic 官方 server）
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - ${HOME}/Documents
    enabled: false
    expose_via_skyler_server: true
  brave-search:
    description: Brave 搜索（需要 BRAVE_API_KEY）
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-brave-search'
    env:
      BRAVE_API_KEY: ${BRAVE_API_KEY}
    enabled: false
    expose_via_skyler_server: false
  notion:
    description: 搜索 / 创建 / 更新 Notion 页面（需要 NOTION_API_KEY，UI 配置）
    transport: stdio
    command: npx
    args:
    - -y
    - '@notionhq/notion-mcp-server'
    env_required:
    - NOTION_API_KEY
    enabled: false
    expose_via_skyler_server: false
  filesystem-skyler:
    description: Read files from MomoOS-v2 repo
    transport: stdio
    enabled: true
    expose_via_skyler_server: true
    command: npx
    args:
    - '@modelcontextprotocol/server-filesystem'
    - /Users/liujunhong/Desktop/MomoOS-v2
activity_watcher:
  enabled: true
  poll_interval_seconds: 30
  fetch_url_content: true
  blocked_apps:
  - 1Password
  - Bitwarden
  - Keychain Access
  blocked_url_patterns:
  - '*chase.com*'
  - '*bankofamerica.com*'
  - '*wellsfargo.com*'
  - '*paypal.com*'
  - '*mail.google.com*'
  - '*outlook.live.com*'
  - '*outlook.office.com*'
  - '*mail.yahoo.com*'
  - '*mail.qq.com*'
  - '*mail.163.com*'
  - '*facebook.com/*'
  - '*instagram.com/*'
  - '*twitter.com/*'
  - '*x.com/*'
  - '*linkedin.com/feed*'
  - '*localhost*'
  - 127.0.0.1*
  - 192.168.*
  - 10.0.*
  trigger_throttle_minutes: 30
  max_daily_triggers: 5
activity_judge:
  enabled: true
  model: dashscope/qwen-turbo
  min_stay_minutes: 5
  throttle_minutes: 10
  prompt_max_chars: 2000
  idle_threshold_seconds: 300
activity_timeline:
  enabled: true
  inject_into_chat: true
  min_session_seconds: 30
  cleanup_days: 30
  cleanup_cron: 59 23 * * *
asr:
  whisper_model_size: small
