<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skyler Demo v0.1</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070b14;
        --panel: rgba(13, 19, 35, 0.82);
        --border: rgba(54, 230, 224, 0.2);
        --text: #eef6ff;
        --muted: #9aa7b8;
        --cyan: #36e6e0;
        --pink: #f2a7c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 16%, rgba(54, 230, 224, 0.16), transparent 28rem),
          radial-gradient(circle at 82% 22%, rgba(242, 167, 200, 0.13), transparent 30rem),
          linear-gradient(135deg, #070b14 0%, #0b1020 100%);
      }

      main {
        width: min(1100px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 56px 0 48px;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 5vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.6;
      }

      .player {
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--panel);
        box-shadow:
          0 28px 80px rgba(0, 0, 0, 0.38),
          0 0 42px rgba(155, 124, 255, 0.12);
        backdrop-filter: blur(18px);
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        background: #000;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      a {
        color: var(--text);
        text-decoration: none;
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid rgba(242, 167, 200, 0.28);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
      }

      .button:hover {
        border-color: rgba(54, 230, 224, 0.48);
        box-shadow: 0 0 22px rgba(54, 230, 224, 0.16);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Skyler Demo v0.1</h1>
        <p>Live2D desktop AI companion system demo</p>
      </header>

      <section class="player" aria-label="Skyler demo video">
        <video
          controls
          preload="metadata"
          poster="../assets/demo-cover.png"
          src="https://github.com/XguihuaX/Skyler/releases/download/demo-v0.1/skyler-demo-final-review-hq-stereo-bgm.mp4"
        ></video>
      </section>

      <nav class="links" aria-label="Fallback links">
        <a
          class="button"
          href="https://github.com/XguihuaX/Skyler/releases/download/demo-v0.1/skyler-demo-final-review-hq-stereo-bgm.mp4"
        >
          Download / open release asset
        </a>
        <a class="button" href="https://github.com/XguihuaX/Skyler/releases/tag/demo-v0.1">
          Release page
        </a>
      </nav>
    </main>
  </body>
</html>
